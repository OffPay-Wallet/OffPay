name = "offpay-api"
main = "src/index.ts"
compatibility_date = "2026-06-02"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
# offpay.app DNS is currently managed outside Cloudflare. Use workers.dev here
# and point api.offpay.app to this Worker from the DNS/frontend host.
# routes = [{ pattern = "api.offpay.app", custom_domain = true }]

[[r2_buckets]]
binding = "PENDING_BACKUP_BUCKET"
bucket_name = "offpay-pending-backups"

[placement]
mode = "smart"

[observability]
enabled = true

[triggers]
crons = ["* * * * *"]

# Optional native KV hot caches. Create these namespaces in Cloudflare and
# paste the generated IDs here before enabling the bindings.
# npx wrangler kv namespace create PRICE_CACHE --config workers/api/wrangler.toml
# npx wrangler kv namespace create TOKEN_REGISTRY_CACHE --config workers/api/wrangler.toml

[[kv_namespaces]]
binding = "PRICE_CACHE"
id = "a774cc121b964536aeea82f42e0ff4c3"

[[kv_namespaces]]
binding = "TOKEN_REGISTRY_CACHE"
id = "dc1e56579a7145989f69bc34a8b069d4"

# Set credentials with `npx wrangler secret put <NAME>`.
# Generate OFFPAY_* secrets with `openssl rand -hex 32`.
# npx wrangler secret put HELIUS_DEVNET_API_KEY
# npx wrangler secret put HELIUS_MAINNET_API_KEY
# npx wrangler secret put HELIUS_DEVNET_RPC_URL
# npx wrangler secret put HELIUS_MAINNET_RPC_URL
# npx wrangler secret put HELIUS_DEVNET_WS_URL
# npx wrangler secret put HELIUS_MAINNET_WS_URL
# npx wrangler secret put ALCHEMY_DEVNET_RPC_URL
# npx wrangler secret put ALCHEMY_MAINNET_RPC_URL
# Optional second Alchemy RPC endpoints, tried after the primary Alchemy RPC URL:
# npx wrangler secret put ALCHEMY_DEVNET_FALLBACK_RPC_URL
# npx wrangler secret put ALCHEMY_MAINNET_FALLBACK_RPC_URL
# npx wrangler secret put ALCHEMY_PRICE_API_KEY
# npx wrangler secret put JUPITER_API_KEY
# npx wrangler secret put UPSTASH_REDIS_REST_URL
# npx wrangler secret put UPSTASH_REDIS_REST_TOKEN
# npx wrangler secret put OFFPAY_BOOTSTRAP_SECRET
# npx wrangler secret put OFFPAY_BACKUP_HMAC_SECRET
# npx wrangler secret put OFFPAY_DEVNET_FAUCET_SECRET_KEY
# Required for invite-code access gate:
# npx wrangler secret put MONGODB_URI
# npx wrangler secret put MONGODB_DATABASE
# npx wrangler secret put OFFPAY_INVITE_CODE_PEPPER
# Required only for worker-side invite-code generation:
# npx wrangler secret put OFFPAY_INVITE_ADMIN_TOKEN
# Required only when OFFPAY_ANDROID_ATTESTATION_MODE = "play_integrity":
# npx wrangler secret put GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL
# npx wrangler secret put GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY
# Optional only when using a gated/private Umbra endpoint:
# npx wrangler secret put UMBRA_API_KEY

[vars]
NODE_ENV = "production"
OFFPAY_PROTOTYPE_MODE = "true"
OFFPAY_INVITE_GATE_MODE = "required"
OFFPAY_AI_CHAT_CREDIT_LIMIT = "5"
OFFPAY_AI_CHAT_CREDIT_WINDOW_MS = "3600000"
OFFPAY_AI_CHAT_CREDITS_BACKEND = "upstash"
OFFPAY_ALLOWED_ORIGINS = "capacitor://localhost,https://offpay.app"
MIN_APP_VERSION = "1.0.0"
BOOTSTRAP_SECRET_VERSION = "1"
OFFPAY_ANDROID_PACKAGE_NAME = "com.offpay.app"
OFFPAY_ANDROID_ATTESTATION_MODE = "prototype_bypass"
OFFPAY_IOS_BUNDLE_ID = "com.offpay.app"
OFFPAY_IOS_TEAM_ID = ""
JUPITER_API_BASE_URL = "https://api.jup.ag"
JUPITER_TRIGGER_API_BASE_URL = "https://api.jup.ag/trigger/v2"
UMBRA_INDEXER_URL_MAINNET = "https://utxo-indexer.api.umbraprivacy.com"
UMBRA_INDEXER_URL_DEVNET = "https://utxo-indexer.api-devnet.umbraprivacy.com"
UMBRA_RELAYER_URL_MAINNET = "https://relayer.api.umbraprivacy.com"
UMBRA_RELAYER_URL_DEVNET = "https://relayer.api-devnet.umbraprivacy.com"
UMBRA_CIRCUIT_VERSION = "v3"
UMBRA_MIN_SDK_VERSION = "3.0.0"
UMBRA_LOCAL_TEST_MODE = "0"
MAGICBLOCK_DEVNET_VALIDATORS = "MAS1Dt9qreoRMQ14YQuhg8UTZMMzDdKhmkZMECCzk57,MEUGGrYPxKk17hCr7wpT6s8dtNokZj5U2L57vjYMS8e,MUS3hc9TCw4cGC12vHNoYcCGzJG1txjgQLZWVoeNHNd,MTEWGuqxUpYZGFJQcp8tLN7x5v9BSeoFHYWQQ3n3xzo"
