name = "offpay-ai-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-25"
workers_dev = true
# offpay.app DNS is currently managed outside Cloudflare. Use workers.dev here
# and point ai.offpay.app to this Worker from the DNS/frontend host.
# routes = [{ pattern = "ai.offpay.app", custom_domain = true }]

[observability]
enabled = true

[[services]]
binding = "OFFPAY_API_AI_CREDITS"
service = "offpay-api"
entrypoint = "AiCreditsEntrypoint"

[ai]
binding = "AI"

[vars]
AI_PROXY_PRIVACY_MODE = "strict"
AI_PROXY_GEMINI_PRIVACY_CONFIRMED = "true"
AI_PROXY_ALLOW_GEMINI_UNPAID = "false"
AI_PROXY_ALLOW_VOICE_FALLBACK_WITH_RETENTION = "false"
# Pin voice to Sarvam for both STT and TTS. While this is "sarvam",
# ElevenLabs is never used as a fallback and an explicit
# preferredProvider=elevenlabs is rejected, even if ELEVENLABS_API_KEY is
# set as a secret. Remove this var to restore Sarvam-first-with-ElevenLabs.
AI_PROXY_VOICE_PROVIDER_LOCK = "sarvam"
CLOUDFLARE_AI_CHAT_MODEL = "@cf/zai-org/glm-4.7-flash"
CLOUDFLARE_AI_PROVIDER_TIMEOUT_MS = "5500"
GEMINI_CHAT_MODEL = "gemini-3.1-flash-lite"
AI_PROXY_PRIMARY_PROVIDER_TIMEOUT_MS = "8000"
GROQ_CHAT_MODEL = "llama-3.1-8b-instant"
GROQ_PROVIDER_TIMEOUT_MS = "16000"
GROQ_MAX_COMPLETION_TOKENS = "4096"
GROQ_REASONING_EFFORT = "default"
SARVAM_STT_MODEL = "saaras:v3"
SARVAM_STT_MODE = "transcribe"
SARVAM_TTS_MODEL = "bulbul:v3"
SARVAM_TTS_SPEAKER = "shubh"
SARVAM_TTS_LANGUAGE = "en-IN"
SARVAM_TTS_CODEC = "mp3"
ELEVENLABS_STT_MODEL = "scribe_v2"
ELEVENLABS_TTS_MODEL = "eleven_flash_v2_5"
ELEVENLABS_OUTPUT_FORMAT = "mp3_44100_128"
ELEVENLABS_ENABLE_LOGGING = "false"
AI_PROXY_MAX_CHAT_BYTES = "65536"
AI_PROXY_MAX_AUDIO_BYTES = "8388608"
AI_PROXY_MAX_TTS_CHARS = "900"
AI_PROXY_PROVIDER_TIMEOUT_MS = "24000"
AI_PROXY_TTS_ENABLED = "true"
AI_PROXY_ALLOWED_ORIGINS = "https://offpay.app"
AI_PROXY_RATE_LIMIT_WINDOW_MS = "60000"
AI_PROXY_RATE_LIMIT_MAX = "40"
# Soft-rollout. Flip to "true" once every shipped app build includes
# EXPO_PUBLIC_OFFPAY_AI_SESSION_SECRET, otherwise older clients 401.
AI_PROXY_REQUIRE_SESSION_TOKEN = "false"

# Set secrets with:
# npx wrangler secret put GEMINI_API_KEY --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put SARVAM_API_KEY --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put ELEVENLABS_API_KEY --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put ELEVENLABS_VOICE_ID --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put AI_PROXY_SESSION_SECRET --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put GROQ_API_KEY --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put UPSTASH_REDIS_REST_URL --config workers/ai-proxy/wrangler.toml
# npx wrangler secret put UPSTASH_REDIS_REST_TOKEN --config workers/ai-proxy/wrangler.toml
#
# AI_PROXY_SESSION_SECRET is the HMAC secret the Worker uses to verify
# the `x-offpay-ai-session` header. Distribute the same value to clients
# via `EXPO_PUBLIC_OFFPAY_AI_SESSION_SECRET` (or, preferably, behind a
# backend-issued bootstrap step). When `AI_PROXY_REQUIRE_SESSION_TOKEN`
# is set to "true" the Worker rejects requests without a valid token.
# Until then the Worker logs the failure but allows the request, so a
# staged rollout doesn't break older app builds.
#
# Chat provider is Workers AI primary through the [ai] binding above,
# using CLOUDFLARE_AI_CHAT_MODEL. Gemini and Groq remain fallback paths
# when their secrets are configured. Voice is locked to Sarvam for STT
# and TTS via AI_PROXY_VOICE_PROVIDER_LOCK="sarvam" in [vars] above;
# ElevenLabs secrets remain supported but dormant until that lock is
# removed.
#
# Set AI_PROXY_ALLOWED_ORIGINS only for browser/web clients. Native app
# requests do not send Origin, so origin allowlists are not a substitute for
# the follow-up attestation/rate-limit gate.
