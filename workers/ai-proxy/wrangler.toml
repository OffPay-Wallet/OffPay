name = "offpay-ai-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-25"
workers_dev = true

[observability]
enabled = false

[vars]
AI_PROXY_PRIVACY_MODE = "strict"
AI_PROXY_GEMINI_PRIVACY_CONFIRMED = "true"
AI_PROXY_ALLOW_GEMINI_UNPAID = "false"
AI_PROXY_ALLOW_VOICE_FALLBACK_WITH_RETENTION = "false"
GEMINI_CHAT_MODEL = "gemma-4-26b-a4b-it"
SARVAM_STT_MODEL = "saaras:v3"
SARVAM_STT_MODE = "transcribe"
SARVAM_TTS_MODEL = "bulbul:v3"
SARVAM_TTS_SPEAKER = "shubh"
SARVAM_TTS_LANGUAGE = "en-IN"
SARVAM_TTS_CODEC = "mp3"
ELEVENLABS_STT_MODEL = "scribe_v2"
ELEVENLABS_TTS_MODEL = "eleven_flash_v2_5"
ELEVENLABS_OUTPUT_FORMAT = "mp3_44100_128"
ELEVENLABS_ENABLE_LOGGING = "false"
AI_PROXY_MAX_CHAT_BYTES = "65536"
AI_PROXY_MAX_AUDIO_BYTES = "8388608"
AI_PROXY_MAX_TTS_CHARS = "900"
AI_PROXY_PROVIDER_TIMEOUT_MS = "20000"
AI_PROXY_TTS_ENABLED = "true"
AI_PROXY_ALLOWED_ORIGINS = ""
AI_PROXY_RATE_LIMIT_WINDOW_MS = "60000"
AI_PROXY_RATE_LIMIT_MAX = "40"
# Soft-rollout. Flip to "true" once every shipped app build includes
# EXPO_PUBLIC_OFFPAY_AI_SESSION_SECRET, otherwise older clients 401.
AI_PROXY_REQUIRE_SESSION_TOKEN = "false"

# Set secrets with:
# npx wrangler secret put GEMINI_API_KEY
# npx wrangler secret put SARVAM_API_KEY
# npx wrangler secret put ELEVENLABS_API_KEY
# npx wrangler secret put ELEVENLABS_VOICE_ID
# npx wrangler secret put AI_PROXY_SESSION_SECRET
#
# AI_PROXY_SESSION_SECRET is the HMAC secret the Worker uses to verify
# the `x-offpay-ai-session` header. Distribute the same value to clients
# via `EXPO_PUBLIC_OFFPAY_AI_SESSION_SECRET` (or, preferably, behind a
# backend-issued bootstrap step). When `AI_PROXY_REQUIRE_SESSION_TOKEN`
# is set to "true" the Worker rejects requests without a valid token.
# Until then the Worker logs the failure but allows the request, so a
# staged rollout doesn't break older app builds.
#
# Chat provider is Google Gemma 4 26B via the Gemini API. Voice uses
# Sarvam (primary) and ElevenLabs (fallback) only.
#
# Set AI_PROXY_ALLOWED_ORIGINS only for browser/web clients. Native app
# requests do not send Origin, so origin allowlists are not a substitute for
# the follow-up attestation/rate-limit gate.
